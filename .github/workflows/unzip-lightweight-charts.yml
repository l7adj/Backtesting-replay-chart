name: Import TradingView lightweight-charts source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download TradingView source using GitHub archive
        run: |
          python - <<'PY'
          import urllib.request
          import zipfile
          import shutil
          from pathlib import Path

          url = 'https://github.com/tradingview/lightweight-charts/archive/refs/heads/master.zip'
          zip_path = Path('tv.zip')
          temp = Path('tv-temp')
          target = Path('tradingview-lightweight-charts-source')

          urllib.request.urlretrieve(url, zip_path)
          if temp.exists():
              shutil.rmtree(temp)
          if target.exists():
              shutil.rmtree(target)
          with zipfile.ZipFile(zip_path) as z:
              z.extractall(temp)
          source = next(temp.iterdir())
          shutil.copytree(source, target)
          zip_path.unlink()
          shutil.rmtree(temp)
          PY

      - name: Commit imported files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add tradingview-lightweight-charts-source
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Import TradingView lightweight-charts source files"
            git push
          fi
