name: Import TradingView lightweight-charts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone TradingView lightweight-charts
        run: |
          git clone --depth 1 --branch v5.1.0 https://github.com/tradingview/lightweight-charts.git imported-lightweight-charts

      - name: Copy files into project folder
        run: |
          mkdir -p tradingview-lightweight-charts-5.1.0
          cp -a imported-lightweight-charts/. tradingview-lightweight-charts-5.1.0/

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add tradingview-lightweight-charts-5.1.0
          git commit -m "Import TradingView lightweight-charts v5.1.0 files" || true
          git push
