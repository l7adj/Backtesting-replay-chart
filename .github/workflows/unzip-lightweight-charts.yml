name: Extract uploaded lightweight-charts zip

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - lightweight-charts-5.1.0.zip
      - .github/workflows/unzip-lightweight-charts.yml

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract uploaded zip
        run: |
          if [ ! -f lightweight-charts-5.1.0.zip ]; then
            echo "ZIP file not found yet. Upload step is still pending."
            exit 0
          fi
          rm -rf .tmp-lightweight-charts tradingview-lightweight-charts-5.1.0
          mkdir -p .tmp-lightweight-charts
          unzip -q lightweight-charts-5.1.0.zip -d .tmp-lightweight-charts
          mkdir -p tradingview-lightweight-charts-5.1.0
          cp -a .tmp-lightweight-charts/lightweight-charts-5.1.0/. tradingview-lightweight-charts-5.1.0/
          rm -rf .tmp-lightweight-charts

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add tradingview-lightweight-charts-5.1.0
          if git diff --cached --quiet; then
            echo "No extracted files to commit"
          else
            git commit -m "Extract TradingView lightweight-charts v5.1.0 source files"
            git push
          fi
