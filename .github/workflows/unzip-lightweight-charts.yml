name: Import TradingView lightweight-charts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          path: app
          fetch-depth: 0

      - name: Checkout TradingView lightweight-charts
        uses: actions/checkout@v4
        with:
          repository: tradingview/lightweight-charts
          ref: v5.1.0
          path: tv-source

      - name: Copy source into your repository
        run: |
          mkdir -p app/tradingview-lightweight-charts-5.1.0
          cp -a tv-source/. app/tradingview-lightweight-charts-5.1.0/

      - name: Commit imported files
        working-directory: app
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add tradingview-lightweight-charts-5.1.0
          git commit -m "Import TradingView lightweight-charts v5.1.0 files" || true
          git pull --rebase origin main || true
          git push
