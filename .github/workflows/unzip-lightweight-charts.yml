name: Import TradingView lightweight-charts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download source zip
        run: |
          curl -L -o lightweight-charts.zip https://github.com/tradingview/lightweight-charts/archive/refs/tags/v5.1.0.zip
          unzip -q lightweight-charts.zip

      - name: Copy files into repository folder
        run: |
          mkdir -p tradingview-lightweight-charts-5.1.0
          cp -a lightweight-charts-5.1.0/. tradingview-lightweight-charts-5.1.0/

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add tradingview-lightweight-charts-5.1.0
          git commit -m "Import TradingView lightweight-charts v5.1.0 files" || true
          git push
