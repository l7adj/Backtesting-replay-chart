<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backtesting Replay Chart</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    *{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Inter,Arial,sans-serif;background:#050913;color:#dbe7ff}button,input,select{font:inherit}button{cursor:pointer}.app{min-height:100vh;padding:12px;background:#050913}.top{height:70px;border:1px solid #1b2942;background:#0b1220;border-radius:16px;display:flex;align-items:center;justify-content:space-between;padding:12px;margin-bottom:12px}.brand h1{margin:0;font-size:18px}.brand p{margin:4px 0 0;color:#7d8ba3;font-size:12px}.metrics{display:flex;gap:8px}.metric{min-width:105px;border:1px solid #1b2942;border-radius:12px;background:#07101f;padding:8px}.metric span{display:block;color:#7d8ba3;font-size:11px}.metric b{display:block;margin-top:3px}.grid{height:calc(100vh - 94px);display:grid;grid-template-columns:230px minmax(0,1fr)330px;gap:12px}.panel{border:1px solid #1b2942;background:#0b1220;border-radius:16px}.left,.rightBox{padding:12px;overflow:auto}.left h2,.rightBox h2{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#8fa3bf;margin:4px 0 10px}.market{width:100%;display:flex;justify-content:space-between;text-align:left;border:1px solid #1b2942;border-radius:12px;background:#08111f;color:#dbe7ff;padding:10px;margin-bottom:8px}.market small{color:#7d8ba3}.active{border-color:#38bdf8!important;background:#0f2c48!important}.frames{display:grid;grid-template-columns:1fr 1fr;gap:8px}.frames button,.controls button,.controls select{border:1px solid #1b2942;background:#08111f;color:#dbe7ff;border-radius:10px;padding:9px}.chartPanel{display:grid;grid-template-rows:auto auto 1fr;overflow:hidden}.chartHead{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid #1b2942;padding:12px;gap:10px}.title{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.title h2{margin:0;font-size:22px}.pill{border-radius:999px;padding:5px 9px;font-weight:800;font-size:12px}.green{color:#22c55e}.red{color:#ef4444}.pill.green{background:rgba(34,197,94,.12)}.pill.red{background:rgba(239,68,68,.12)}.chartHead p{margin:6px 0 0;color:#8fa3bf;font-size:13px}.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.progress{display:flex;gap:10px;align-items:center;border-bottom:1px solid #1b2942;padding:9px 12px}.progress input{width:100%;accent-color:#38bdf8}.progress span{color:#8fa3bf;font-size:12px;min-width:80px;text-align:right}#chart{width:100%;height:100%}.right{display:grid;grid-template-rows:auto 1fr;gap:12px;min-height:0}.ticket label{display:grid;gap:6px;color:#8fa3bf;font-size:12px}.ticket input{border:1px solid #1b2942;border-radius:10px;background:#08111f;color:#dbe7ff;padding:10px}.ticketBtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.ticketBtns button,.closeBtn{border:0;border-radius:12px;padding:11px;color:#fff;font-weight:800}.buy{background:#16a34a}.sell{background:#dc2626}.closeBtn{background:#2563eb;width:100%;margin-top:8px}.closeBtn:disabled,.ticketBtns button:disabled{opacity:.45}.openTrade{margin-top:10px;border:1px solid #1b2942;border-radius:12px;background:#08111f;padding:10px;display:flex;justify-content:space-between}.journal{min-height:0;overflow:hidden;display:grid;grid-template-rows:auto 1fr}.list{overflow:auto;display:grid;gap:8px;align-content:start}.trade{border:1px solid #1b2942;border-radius:12px;background:#08111f;padding:10px;display:flex;justify-content:space-between;gap:10px}.trade small{display:block;color:#7d8ba3;margin-top:3px}.tradeRight{text-align:right}.empty{color:#7d8ba3;margin:0}@media(max-width:1050px){.grid{grid-template-columns:1fr;height:auto}.right{grid-template-rows:auto auto}.top{height:auto;flex-direction:column;align-items:flex-start}.metrics{width:100%;overflow:auto}.left{display:grid;grid-template-columns:1fr 1fr;gap:12px}.chartPanel{height:70vh}}@media(max-width:650px){.left{grid-template-columns:1fr}.chartHead{flex-direction:column}.controls{justify-content:flex-start}.app{padding:8px}}
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="brand"><h1>Backtesting Replay Chart</h1><p>TradingView-like replay and trade journal</p></div>
      <div class="metrics">
        <div class="metric"><span>Closed trades</span><b id="closedCount">0</b></div>
        <div class="metric"><span>Win rate</span><b id="winRate">0.0%</b></div>
        <div class="metric"><span>Total PnL</span><b id="totalPnl" class="green">0.00</b></div>
      </div>
    </div>
    <div class="grid">
      <aside class="panel left">
        <div><h2>Markets</h2><div id="markets"></div></div>
        <div><h2>Timeframe</h2><div class="frames" id="frames"></div></div>
      </aside>
      <section class="panel chartPanel">
        <div class="chartHead">
          <div><div class="title"><h2 id="symbolTitle">BTCUSDT</h2><span id="changePill" class="pill green">0.00 / 0.00%</span></div><p id="ohlc">O - · H - · L - · C -</p></div>
          <div class="controls"><button id="playBtn">Play</button><button id="stepBtn">Step</button><button id="resetBtn">Reset</button><select id="speedSel"><option value="1">x1</option><option value="2" selected>x2</option><option value="5">x5</option><option value="10">x10</option></select></div>
        </div>
        <div class="progress"><input id="range" type="range" min="50" max="900" value="140"><span id="cursorText">140/900</span></div>
        <div id="chart"></div>
      </section>
      <aside class="right">
        <div class="panel rightBox ticket"><h2>Trade Ticket</h2><label>Quantity<input id="qty" type="number" min="0.01" step="0.01" value="1"></label><div class="ticketBtns"><button id="buyBtn" class="buy">Buy</button><button id="sellBtn" class="sell">Sell</button></div><button id="closeBtn" class="closeBtn" disabled>Close position</button><div id="openBox"></div></div>
        <div class="panel rightBox journal"><h2>Trade Journal</h2><div class="list" id="tradeList"><p class="empty">No trades yet.</p></div></div>
      </aside>
    </div>
  </div>
  <script>
    const symbols=[['BTCUSDT','Bitcoin',911,64000],['ETHUSDT','Ethereum',317,3200],['SOLUSDT','Solana',129,145],['EURUSD','Euro / Dollar',70,1.08],['XAUUSD','Gold',1947,2350]];
    const frames=['1m','5m','15m','1h','4h']; let symbol='BTCUSDT', frame='15m', cursor=140, playing=false, speed=2, timer=null, trades=[];
    const seeded=s=>{const x=Math.sin(s)*10000;return x-Math.floor(x)};
    const fmt=v=>v<10?v.toFixed(5):v.toLocaleString('en-US',{maximumFractionDigits:2});
    const timeAt=(i,f)=>{const step={"1m":1,"5m":5,"15m":15,"1h":60,"4h":240}[f]||15;const d=new Date('2025-01-01T00:00:00Z');d.setMinutes(d.getMinutes()+i*step);return Math.floor(d.getTime()/1000)};
    function candlesFor(sym,fr){const cfg=symbols.find(x=>x[0]===sym)||symbols[0];let p=cfg[3], out=[];for(let i=0;i<900;i++){const wave=Math.sin(i/21)*p*.0009, noise=(seeded(cfg[2]+i*13)-.5)*p*.004, open=p, close=Math.max(.0001,open+wave+noise), spread=Math.abs(close-open)+p*(.001+seeded(cfg[2]+i*7)*.003), high=Math.max(open,close)+spread*seeded(cfg[2]+i*3), low=Math.min(open,close)-spread*seeded(cfg[2]+i*5);out.push({time:timeAt(i,fr),open:+open.toFixed(p<10?5:2),high:+high.toFixed(p<10?5:2),low:+low.toFixed(p<10?5:2),close:+close.toFixed(p<10?5:2),volume:Math.round(1000+seeded(cfg[2]+i*19)*120000)});p=close}return out}
    let all=candlesFor(symbol,frame); const chart=LightweightCharts.createChart(document.getElementById('chart'),{autoSize:true,layout:{background:{color:'#070b13'},textColor:'#b6c2d9'},grid:{vertLines:{color:'rgba(148,163,184,.08)'},horzLines:{color:'rgba(148,163,184,.08)'}},rightPriceScale:{borderColor:'rgba(148,163,184,.18)',scaleMargins:{top:.08,bottom:.23}},timeScale:{borderColor:'rgba(148,163,184,.18)',timeVisible:true}});
    const candles=chart.addSeries(LightweightCharts.CandlestickSeries,{upColor:'#22c55e',downColor:'#ef4444',wickUpColor:'#22c55e',wickDownColor:'#ef4444',borderVisible:false}); const vol=chart.addSeries(LightweightCharts.HistogramSeries,{priceFormat:{type:'volume'},priceScaleId:'',lastValueVisible:false,priceLineVisible:false}); vol.priceScale().applyOptions({scaleMargins:{top:.8,bottom:0}});
    function render(){const visible=all.slice(0,cursor);candles.setData(visible.map(({volume,...c})=>c));vol.setData(visible.map(c=>({time:c.time,value:c.volume,color:c.close>=c.open?'rgba(34,197,94,.28)':'rgba(239,68,68,.28)'})));chart.timeScale().fitContent();const cur=visible.at(-1),prev=visible.at(-2)||cur;if(!cur)return;const ch=cur.close-prev.close, pct=ch/prev.close*100;document.getElementById('symbolTitle').textContent=symbol;document.getElementById('changePill').className='pill '+(ch>=0?'green':'red');document.getElementById('changePill').textContent=(ch>=0?'+':'')+fmt(ch)+' / '+pct.toFixed(2)+'%';document.getElementById('ohlc').textContent=`O ${fmt(cur.open)} · H ${fmt(cur.high)} · L ${fmt(cur.low)} · C ${fmt(cur.close)}`;document.getElementById('cursorText').textContent=cursor+'/'+all.length;document.getElementById('range').value=cursor;renderTrades()}
    function renderControls(){document.getElementById('markets').innerHTML=symbols.map(s=>`<button class="market ${s[0]===symbol?'active':''}" data-sym="${s[0]}"><span><b>${s[0]}</b><small>${s[1]}</small></span><small>${fmt(s[3])}</small></button>`).join('');document.querySelectorAll('[data-sym]').forEach(b=>b.onclick=()=>{symbol=b.dataset.sym;all=candlesFor(symbol,frame);cursor=140;trades=[];stop();renderControls();render()});document.getElementById('frames').innerHTML=frames.map(f=>`<button class="${f===frame?'active':''}" data-frame="${f}">${f}</button>`).join('');document.querySelectorAll('[data-frame]').forEach(b=>b.onclick=()=>{frame=b.dataset.frame;all=candlesFor(symbol,frame);cursor=140;trades=[];stop();renderControls();render()})}
    function stats(){const closed=trades.filter(t=>t.status==='closed'), pnl=closed.reduce((s,t)=>s+t.pnl,0), wins=closed.filter(t=>t.pnl>0).length;document.getElementById('closedCount').textContent=closed.length;document.getElementById('winRate').textContent=(closed.length?wins/closed.length*100:0).toFixed(1)+'%';const el=document.getElementById('totalPnl');el.textContent=pnl.toFixed(2);el.className=pnl>=0?'green':'red'}
    function renderTrades(){const open=trades.find(t=>t.status==='open');document.getElementById('closeBtn').disabled=!open;document.getElementById('buyBtn').disabled=!!open;document.getElementById('sellBtn').disabled=!!open;document.getElementById('openBox').innerHTML=open?`<div class="openTrade"><span>Open ${open.side}</span><b>${fmt(open.entry)}</b></div>`:'';document.getElementById('tradeList').innerHTML=trades.length?trades.map(t=>`<div class="trade"><div><b class="${t.side==='long'?'green':'red'}">${t.side.toUpperCase()} ${t.symbol}</b><small>${t.entryTime}</small>${t.exitTime?`<small>Exit: ${t.exitTime}</small>`:''}</div><div class="tradeRight"><span>${fmt(t.entry)} ${t.exit?'→ '+fmt(t.exit):''}</span><b class="${(t.pnl||0)>=0?'green':'red'}">${t.status==='open'?'OPEN':t.pnl.toFixed(2)}</b></div></div>`).join(''):'<p class="empty">No trades yet.</p>';stats()}
    function stop(){playing=false;clearInterval(timer);timer=null;document.getElementById('playBtn').textContent='Play'} function play(){playing=!playing;document.getElementById('playBtn').textContent=playing?'Pause':'Play';clearInterval(timer);if(playing)timer=setInterval(()=>{cursor=Math.min(cursor+1,all.length);render();if(cursor>=all.length)stop()},Math.max(80,700/speed))}
    document.getElementById('playBtn').onclick=play;document.getElementById('stepBtn').onclick=()=>{cursor=Math.min(cursor+1,all.length);render()};document.getElementById('resetBtn').onclick=()=>{stop();cursor=140;trades=[];render()};document.getElementById('range').oninput=e=>{cursor=+e.target.value;render()};document.getElementById('speedSel').onchange=e=>{speed=+e.target.value;if(playing){stop();play()}};
    function openPos(side){const cur=all.slice(0,cursor).at(-1);if(!cur||trades.find(t=>t.status==='open'))return;trades.unshift({id:Date.now(),side,symbol,entry:cur.close,qty:+document.getElementById('qty').value||1,entryTime:new Date(cur.time*1000).toLocaleString(),status:'open'});renderTrades()} function closePos(){const cur=all.slice(0,cursor).at(-1), t=trades.find(x=>x.status==='open');if(!cur||!t)return;t.exit=cur.close;t.exitTime=new Date(cur.time*1000).toLocaleString();t.pnl=+(((t.side==='long'?cur.close-t.entry:t.entry-cur.close)*t.qty).toFixed(2));t.status='closed';renderTrades()} document.getElementById('buyBtn').onclick=()=>openPos('long');document.getElementById('sellBtn').onclick=()=>openPos('short');document.getElementById('closeBtn').onclick=closePos;
    renderControls();render();
  </script>
</body>
</html>
